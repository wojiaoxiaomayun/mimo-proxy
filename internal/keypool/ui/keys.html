<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiMo Proxy - Key 管理</title>
    <link rel="stylesheet" href="/ui/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"/><circle cx="16.5" cy="7.5" r=".5"/></g></svg>
                MiMo Proxy
            </div>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-item active" href="/ui/keys">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"/><circle cx="16.5" cy="7.5" r=".5"/></g></svg>
                Key 管理
            </a>
            <a class="nav-item" href="/ui/channels">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></g></svg>
                渠道
            </a>
            <a class="nav-item" href="/ui/logs">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M15 12h-5m5-4h-5m9 9V5a2 2 0 0 0-2-2H4"/><path d="M8 21h12a2 2 0 0 0 2-2v-1a1 1 0 0 0-1-1H11a1 1 0 0 0-1 1v1a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v2a1 1 0 0 0 1 1h3"/></g></svg>
                日志
            </a>
            <a class="nav-item" href="/ui/settings">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0a2.34 2.34 0 0 0 3.319 1.915a2.34 2.34 0 0 1 2.33 4.033a2.34 2.34 0 0 0 0 3.831a2.34 2.34 0 0 1-2.33 4.033a2.34 2.34 0 0 0-3.319 1.915a2.34 2.34 0 0 1-4.659 0a2.34 2.34 0 0 0-3.32-1.915a2.34 2.34 0 0 1-2.33-4.033a2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/></g></svg>
                设置
            </a>
        </nav>
        <div class="sidebar-footer">MiMo Key Pool Proxy</div>
    </aside>

    <div class="main">
        <div class="main-header">
            <h1>Key 管理</h1>
            <p>管理 API Key 池，监控代理请求与用量</p>
        </div>
        <div class="main-body">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">总调用</div>
                    <div class="stat-value" id="totalCalls">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">总 Tokens</div>
                    <div class="stat-value" id="totalTokens">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Key 数量</div>
                    <div class="stat-value" id="keyCount">-</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <div class="card-title">API Keys</div>
                        <div style="display:flex;gap:0.5rem;align-items:center;">
                            <select id="channelFilter" style="width:10rem;height:2rem;font-size:0.8125rem;" onchange="fetchKeys()">
                                <option value="0">全部渠道</option>
                            </select>
                            <button class="btn btn-primary btn-sm" onclick="openAddKeyModal()">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14m-7-7v14"/></svg>
                                添加 Key
                            </button>
                        </div>
                    </div>
                    <div class="card-description" style="margin-top:0.5rem;">管理 API Key，每个 Key 可添加备注标识来源账号</div>
                </div>
                <div class="card-content">
                    <div id="keysGrid"></div>
                </div>
            </div>

            <div style="margin-top:1.5rem;text-align:center;font-size:0.8125rem;color:hsl(var(--muted-foreground));" id="refreshTime"></div>
        </div>
    </div>

    <!-- Test Key Modal -->
    <div class="modal-overlay" id="testModal">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">测试 Key</div>
                <button class="modal-close" onclick="document.getElementById('testModal').classList.remove('open')" aria-label="关闭">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- Add Key Modal -->
    <div class="modal-overlay" id="addKeyModal">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-title">添加 Key</div>
                <button class="modal-close" onclick="closeAddKeyModal()" aria-label="关闭">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="field-group">
                    <label for="addKeyChannel">渠道</label>
                    <select id="addKeyChannel" style="width:100%;"></select>
                </div>
                <div class="field-group" style="margin-top:1rem;">
                    <label for="addKeyInput">API Key</label>
                    <input type="text" id="addKeyInput" placeholder="sk-..." style="width:100%;">
                </div>
                <div class="field-group" style="margin-top:1rem;">
                    <label for="addKeyNote">备注</label>
                    <textarea id="addKeyNote" rows="3" placeholder="例如：张三的账号、测试环境…" style="width:100%;"></textarea>
                    <div class="field-hint">标识此 Key 的来源，方便管理</div>
                </div>
                <div class="field-group" style="margin-top:1rem;">
                    <label>默认模型</label>
                    <div style="display:flex;gap:0.5rem;">
                        <select id="addKeyModel" style="flex:1;">
                            <option value="">不指定（透传原始模型）</option>
                        </select>
                        <button class="btn btn-outline" id="refreshModelsBtn" onclick="fetchModelsForKey()" data-tip="刷新模型列表">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9a9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5m5 4a9 9 0 0 1-9 9a9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></g></svg>
                        </button>
                    </div>
                    <div class="field-hint">若请求的模型不在渠道列表中，自动替换为默认模型</div>
                </div>
                <div style="margin-top:1.25rem;display:flex;gap:0.5rem;">
                    <button class="btn btn-outline" onclick="closeAddKeyModal()" style="flex:1;">取消</button>
                    <button class="btn btn-primary" onclick="submitAddKey()" style="flex:1;">添加</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Key Modal -->
    <div class="modal-overlay" id="editKeyModal">
        <div class="modal" style="max-width:28rem;" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-title">编辑 Key</div>
                <button class="modal-close" onclick="closeEditKeyModal()" aria-label="关闭">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="field-group">
                    <label>Key</label>
                    <code id="editKeyDisplay" style="display:block;font-size:0.8125rem;background:hsl(var(--muted));padding:0.5rem 0.75rem;border-radius:var(--radius);word-break:break-all;"></code>
                </div>
                <div class="field-group" style="margin-top:1rem;">
                    <label>备注</label>
                    <textarea id="editKeyNote" rows="2" style="width:100%;"></textarea>
                </div>
                <div class="field-group" style="margin-top:1rem;">
                    <label>默认模型</label>
                    <div style="display:flex;gap:0.5rem;">
                        <select id="editKeyModel" style="flex:1;">
                            <option value="">不指定（透传原始模型）</option>
                        </select>
                        <button class="btn btn-outline" id="editRefreshModelsBtn" onclick="fetchModelsForEditKey()" data-tip="刷新模型列表">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9a9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5m5 4a9 9 0 0 1-9 9a9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></g></svg>
                        </button>
                    </div>
                </div>
                <div style="margin-top:1.25rem;display:flex;gap:0.5rem;">
                    <button class="btn btn-outline" onclick="closeEditKeyModal()" style="flex:1;">取消</button>
                    <button class="btn btn-primary" onclick="submitEditKey()" style="flex:1;">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="/ui/common.js"></script>
    <script>
        /* ========== Channels Cache (for key page needs) ========== */
        let allChannels = [];

        async function loadChannels() {
            try {
                const res = await fetch(API_BASE + '/channels');
                const data = await res.json();
                allChannels = data.channels || [];
                const filter = document.getElementById('channelFilter');
                if (filter) {
                    const val = filter.value;
                    filter.innerHTML = '<option value="0">全部渠道</option>' +
                        allChannels.map(c => `<option value="${c.id}">${c.name || c.prefix || '渠道'+c.id}</option>`).join('');
                    filter.value = val || '0';
                }
            } catch (e) { console.error('loadChannels:', e); }
        }

        /* ========== Keys Page ========== */

        async function fetchStats() {
            try {
                const res = await fetch(API_BASE + '/stats');
                const data = await res.json();
                document.getElementById('totalCalls').textContent = (data.total_calls || 0).toLocaleString();
                document.getElementById('totalTokens').textContent = formatTokens(data.total_tokens);
                document.getElementById('keyCount').textContent = (data.enabled_keys || 0) + (data.disabled_keys || 0);
            } catch (e) { console.error('fetchStats:', e); }
        }

        function renderKeysTable(keys) {
            if (!keys || keys.length === 0) {
                return `<div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                    <p>暂无 API Key</p><p class="empty-hint">添加你的第一个 Key 开始使用</p>
                </div>`;
            }
            let rows = '';
            for (const k of keys) {
                const badge = k.enabled
                    ? `<span class="badge badge-success"><span class="badge-dot"></span>启用</span>`
                    : `<span class="badge badge-warning"><span class="badge-dot"></span>禁用</span>`;
                const toggle = k.enabled
                    ? `<button class="btn btn-sm btn-ghost" data-tip="禁用" onclick="toggleKey('${k.key}', ${k.enabled})">${ICO.toggleOn}</button>`
                    : `<button class="btn btn-sm btn-ghost" data-tip="启用" onclick="toggleKey('${k.key}', ${k.enabled})">${ICO.toggleOff}</button>`;
                const noteDisplay = k.note
                    ? `<span class="td-note" title="${k.note}">${k.note}</span>`
                    : `<span class="td-note-empty" onclick='openEditKeyModal(${JSON.stringify(k).replace(/'/g,"&#39;")})'>点击添加备注</span>`;
                rows += `<tr>
                    <td class="td-key" title="${k.key}">${maskKey(k.key)}</td>
                    <td>${noteDisplay}</td>
                    <td style="font-size:0.8125rem;white-space:nowrap;">${k.channel_name || '-'}</td>
                    <td>${k.is_active ? '<span class="badge badge-success"><span class="badge-dot"></span>使用中</span>' : ''}</td>
                    <td>${badge}</td>
                    <td class="td-usage">${k.usage_count}</td>
                    <td class="td-usage" style="font-weight:600;">${formatTokens(k.total_tokens)}</td>
                    <td class="td-date">${formatDate(k.created_at)}</td>
                    <td class="td-actions"><div class="btn-group">
                        <button class="btn btn-sm btn-ghost" data-tip="测试" onclick="openTestModal('${k.key}', ${k.channel_id})">${ICO.play}</button>
                        ${k.is_pinned
                            ? `<button class="btn btn-sm btn-ghost" data-tip="取消固定" onclick="unpinKey(${k.channel_id})">${ICO.pin}</button>`
                            : `<button class="btn btn-sm btn-ghost" data-tip="设为固定" onclick="pinKey(${k.channel_id},'${k.key}')">${ICO.pinOff}</button>`}
                        <button class="btn btn-sm btn-ghost" data-tip="编辑" onclick='openEditKeyModal(${JSON.stringify(k).replace(/'/g,"&#39;")})'>${ICO.pencil}</button>
                        ${toggle}
                        <button class="btn btn-sm btn-ghost" data-tip="删除" style="color:hsl(var(--destructive))" onclick="removeKey('${k.key}')">${ICO.trash}</button>
                    </div></td>
                </tr>`;
            }
            return `<div class="table-wrapper"><table><thead><tr>
                <th>Key</th><th>备注</th><th>渠道</th><th>使用</th><th>状态</th><th>调用</th><th>Total</th><th>创建时间</th><th style="text-align:right">操作</th>
            </tr></thead><tbody>${rows}</tbody></table></div>`;
        }

        async function fetchKeys() {
            try {
                const channelID = document.getElementById('channelFilter')?.value || '0';
                const res = await fetch(API_BASE + '/keys?channel=' + channelID);
                const data = await res.json();
                document.getElementById('keysGrid').innerHTML = renderKeysTable(data.keys || []);
            } catch (e) { console.error('fetchKeys:', e); }
        }

        /* ========== Edit Key Modal ========== */

        let editKeyData = null;

        function openEditKeyModal(k) {
            editKeyData = k;
            document.getElementById('editKeyDisplay').textContent = k.key;
            document.getElementById('editKeyNote').value = k.note || '';
            document.getElementById('editKeyModel').innerHTML = '<option value="">不指定（透传原始模型）</option>' +
                (k.default_model ? `<option value="${k.default_model}" selected>${k.default_model}</option>` : '');
            document.getElementById('editKeyModal').classList.add('open');
        }

        function closeEditKeyModal() {
            document.getElementById('editKeyModal').classList.remove('open');
            editKeyData = null;
        }

        async function fetchModelsForEditKey() {
            if (!editKeyData) return;
            const sel = document.getElementById('editKeyModel');
            const btn = document.getElementById('editRefreshModelsBtn');
            sel.innerHTML = '<option value="">加载中…</option>';
            btn.disabled = true;
            try {
                const res = await fetch(API_BASE + '/models?channel=' + editKeyData.channel_id + '&key=' + encodeURIComponent(editKeyData.key));
                const data = await res.json();
                let opts = '<option value="">不指定（透传原始模型）</option>';
                if (data.data && data.data.length > 0) {
                    for (const m of data.data) {
                        const selected = m.id === editKeyData.default_model ? ' selected' : '';
                        opts += `<option value="${m.id}"${selected}>${m.id}</option>`;
                    }
                }
                sel.innerHTML = opts;
            } catch (e) { sel.innerHTML = '<option value="">不指定（透传原始模型）</option>'; }
            btn.disabled = false;
        }

        async function submitEditKey() {
            if (!editKeyData) return;
            const note = document.getElementById('editKeyNote').value.trim();
            const default_model = document.getElementById('editKeyModel').value || '';
            try {
                await fetch(API_BASE + '/keys', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({action:'update', key: editKeyData.key, note, default_model})
                });
                closeEditKeyModal();
                await fetchKeys();
                showToast('已保存');
            } catch (e) { alert('保存失败: ' + e); }
        }

        /* ========== Add Key Modal ========== */

        async function fetchModelsForKey() {
            const channelID = document.getElementById('addKeyChannel').value;
            const key = document.getElementById('addKeyInput').value.trim();
            const sel = document.getElementById('addKeyModel');
            const btn = document.getElementById('refreshModelsBtn');
            if (!key) { showToast('请先输入 Key', true); return; }
            sel.innerHTML = '<option value="">加载中…</option>';
            btn.disabled = true;
            try {
                const res = await fetch(API_BASE + '/models?channel=' + channelID + '&key=' + encodeURIComponent(key));
                const data = await res.json();
                let opts = '<option value="">不指定（透传原始模型）</option>';
                if (data.data && data.data.length > 0) {
                    for (const m of data.data) opts += `<option value="${m.id}">${m.id}</option>`;
                }
                sel.innerHTML = opts;
            } catch (e) {
                sel.innerHTML = '<option value="">不指定（透传原始模型）</option>';
            }
            btn.disabled = false;
        }

        async function openAddKeyModal() {
            document.getElementById('addKeyInput').value = '';
            document.getElementById('addKeyNote').value = '';
            document.getElementById('addKeyModel').innerHTML = '<option value="">不指定（透传原始模型）</option>';
            if (allChannels.length === 0) await loadChannels();
            const sel = document.getElementById('addKeyChannel');
            sel.innerHTML = allChannels.map(c => `<option value="${c.id}">${c.name || c.prefix || '渠道'+c.id}</option>`).join('');
            const filterVal = document.getElementById('channelFilter')?.value;
            if (filterVal && filterVal !== '0') sel.value = filterVal;
            document.getElementById('addKeyModal').classList.add('open');
            setTimeout(() => document.getElementById('addKeyInput').focus(), 100);
        }
        function closeAddKeyModal() {
            document.getElementById('addKeyModal').classList.remove('open');
        }

        async function submitAddKey() {
            const key = document.getElementById('addKeyInput').value.trim();
            const note = document.getElementById('addKeyNote').value.trim();
            const channel_id = parseInt(document.getElementById('addKeyChannel').value) || 0;
            const default_model = document.getElementById('addKeyModel').value || '';
            if (!key) { document.getElementById('addKeyInput').focus(); return; }
            try {
                const res = await fetch(API_BASE + '/keys', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({action:'add', key, note, channel_id, default_model})
                });
                if (res.ok) {
                    closeAddKeyModal();
                    await Promise.all([fetchKeys(), fetchStats()]);
                    showToast('Key 已添加');
                }
            } catch (e) { alert('添加失败: ' + e); }
        }

        /* ========== Key Actions ========== */

        async function toggleKey(key, on) {
            try {
                const res = await fetch(API_BASE + '/keys', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({action: on ? 'disable' : 'enable', key}) });
                if (res.ok) await Promise.all([fetchKeys(), fetchStats()]);
            } catch (e) { alert('操作失败: ' + e); }
        }

        async function removeKey(key) {
            if (!confirm('确定删除这个 Key？')) return;
            try {
                const res = await fetch(API_BASE + '/keys', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({action:'remove', key}) });
                if (res.ok) await Promise.all([fetchKeys(), fetchStats()]);
            } catch (e) { alert('删除失败: ' + e); }
        }

        async function pinKey(channelID, key) {
            try {
                const res = await fetch(API_BASE + '/keys', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({action:'pin-key', key, channel_id: channelID}) });
                if (res.ok) { await fetchKeys(); showToast('已设为当前使用 Key'); }
            } catch (e) { alert('操作失败: ' + e); }
        }

        async function unpinKey(channelID) {
            try {
                const res = await fetch(API_BASE + '/keys', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({action:'unpin-key', channel_id: channelID}) });
                if (res.ok) { await fetchKeys(); showToast('已取消固定'); }
            } catch (e) { alert('操作失败: ' + e); }
        }

        /* ========== Test Key Modal ========== */

        function closeTestModal() { document.getElementById('testModal').classList.remove('open'); }

        async function openTestModal(key, channelID) {
            channelID = channelID || 0;
            const overlay = document.getElementById('testModal');
            document.getElementById('modalTitle').textContent = '测试 Key';
            document.getElementById('modalBody').innerHTML = `
                <div class="result-row" style="border:none;padding-bottom:0.75rem;">
                    <span class="result-label">Key</span>
                    <span class="result-value" style="font-family:monospace;font-size:0.8125rem;">${maskKey(key)}</span>
                </div>
                <div style="margin-bottom:1rem;">
                    <label style="display:block;font-size:0.8125rem;font-weight:500;margin-bottom:0.375rem;">模型</label>
                    <div class="loading" style="padding:1rem 0;"><div class="spinner" style="width:1.25rem;height:1.25rem;"></div>加载模型列表…</div>
                </div>`;
            overlay.classList.add('open');

            try {
                const res = await fetch(API_BASE + '/models?channel=' + channelID + '&key=' + encodeURIComponent(key));
                if (!res.ok) {
                    let msg = `获取模型失败 (HTTP ${res.status})`;
                    try { const e = await res.json(); if (e.error) msg = e.error.message || e.error; } catch(_){}
                    throw new Error(msg);
                }
                const data = await res.json();
                let opts = '';
                if (data.data && data.data.length > 0) {
                    for (const m of data.data) opts += `<option value="${m.id}">${m.id}</option>`;
                } else {
                    opts = '<option value="mimo-v2.5-pro">mimo-v2.5-pro</option>';
                }
                document.getElementById('modalBody').innerHTML = `
                    <div class="result-row" style="border:none;padding-bottom:0.75rem;">
                        <span class="result-label">Key</span>
                        <span class="result-value" style="font-family:monospace;font-size:0.8125rem;">${maskKey(key)}</span>
                    </div>
                    <div style="margin-bottom:1rem;">
                        <label style="display:block;font-size:0.8125rem;font-weight:500;margin-bottom:0.375rem;">模型</label>
                        <select id="testModelSelect" style="width:100%;">${opts}</select>
                    </div>
                    <button class="btn btn-primary btn-full" onclick="_runTest('${key}', ${channelID})">开始测试</button>`;
            } catch (e) {
                document.getElementById('modalBody').innerHTML = `
                    <div class="result-row" style="border:none;padding-bottom:0.75rem;">
                        <span class="result-label">Key</span>
                        <span class="result-value" style="font-family:monospace;font-size:0.8125rem;">${maskKey(key)}</span>
                    </div>
                    <div class="result-error-banner" style="margin-top:0.5rem;">
                        ${ICO.cross}
                        <span>${e.message || '网络错误'}</span>
                    </div>
                    <div style="margin-bottom:1rem;">
                        <label style="display:block;font-size:0.8125rem;font-weight:500;margin-bottom:0.375rem;">模型（手动输入）</label>
                        <input type="text" id="testModelSelect" style="width:100%;" value="mimo-v2.5-pro" placeholder="输入模型名称">
                    </div>
                    <button class="btn btn-primary btn-full" onclick="_runTest('${key}', ${channelID})">仍然测试</button>`;
            }
        }

        async function _runTest(key, channelID) {
            const model = document.getElementById('testModelSelect').value;
            const body = document.getElementById('modalBody');
            body.innerHTML = `<div class="loading"><div class="spinner"></div>正在测试 ${model} …</div>`;
            try {
                const t0 = performance.now();
                const res = await fetch(API_BASE + '/test-key', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({key, model, channel_id: channelID||0}) });
                if (!res.ok) {
                    let msg = `HTTP ${res.status}`;
                    try { const e = await res.json(); msg = e.error || e.message || msg; } catch(_){}
                    body.innerHTML = `<div class="result-error-banner">
                        ${ICO.cross}
                        <span>请求失败：${msg}</span></div>
                        <div style="margin-top:1rem;"><button class="btn btn-outline btn-full" onclick="closeTestModal()">关闭</button></div>`;
                    return;
                }
                const data = await res.json();
                renderTestResult(data, Math.round(performance.now() - t0));
            } catch (e) {
                body.innerHTML = `<div class="result-error-banner">
                    ${ICO.cross}
                    <span>请求失败：${e.message || '网络错误'}</span></div>
                    <div style="margin-top:1rem;"><button class="btn btn-outline btn-full" onclick="closeTestModal()">关闭</button></div>`;
            }
        }

        function renderTestResult(data, netMs) {
            const body = document.getElementById('modalBody');
            const sep = '<div class="separator" style="margin:0.75rem 0;"></div>';
            const closeBtn = '<div style="margin-top:1rem;"><button class="btn btn-outline btn-full" onclick="closeTestModal()">关闭</button></div>';

            if (data.status === 'ok') {
                const d = data.data || {}, u = d.usage || {}, cd = u.completion_tokens_details || {};
                const ch = (d.choices || [])[0] || {};
                body.innerHTML = `
                    <div class="result-success-banner">${ICO.check}<span>Key 验证通过</span></div>
                    <div class="result-row"><span class="result-label">Request ID</span><span class="result-value" style="font-family:monospace;font-size:0.75rem;">${d.id||'-'}</span></div>
                    <div class="result-row"><span class="result-label">模型</span><span class="result-value">${d.model||'-'}</span></div>
                    <div class="result-row"><span class="result-label">停止原因</span><span class="result-value">${ch.finish_reason||'-'}</span></div>
                    <div class="result-row"><span class="result-label">服务延迟</span><span class="result-value">${data.latency} ms</span></div>
                    <div class="result-row"><span class="result-label">网络往返</span><span class="result-value">${netMs} ms</span></div>
                    ${sep}
                    <div class="result-row"><span class="result-label">Prompt Tokens</span><span class="result-value">${formatTokens(u.prompt_tokens)}</span></div>
                    <div class="result-row"><span class="result-label">Completion Tokens</span><span class="result-value">${formatTokens(u.completion_tokens)}</span></div>
                    <div class="result-row"><span class="result-label">Reasoning Tokens</span><span class="result-value">${formatTokens(cd.reasoning_tokens)}</span></div>
                    <div class="result-row"><span class="result-label">Total Tokens</span><span class="result-value" style="font-weight:600;">${formatTokens(u.total_tokens)}</span></div>
                    ${sep}
                    <div style="font-size:0.8125rem;font-weight:500;margin-bottom:0.5rem;">回复内容</div>
                    <div style="font-size:0.8125rem;color:hsl(var(--muted-foreground));background:hsl(var(--muted));padding:0.75rem;border-radius:var(--radius);line-height:1.6;white-space:pre-wrap;word-break:break-word;">${(ch.message&&ch.message.content)||'(empty)'}</div>
                    ${closeBtn}`;
            } else {
                let errMsg = '';
                if (data.error_body) {
                    if (data.error_body.error) errMsg = typeof data.error_body.error === 'string' ? data.error_body.error : data.error_body.error.message || JSON.stringify(data.error_body.error);
                    else errMsg = JSON.stringify(data.error_body);
                }
                body.innerHTML = `
                    <div class="result-error-banner">
                        ${ICO.cross}
                        <span>Key 验证失败</span></div>
                    <div class="result-row"><span class="result-label">HTTP 状态码</span><span class="result-value" style="color:hsl(0 84.2% 60.2%);font-weight:600;">${data.code||'-'}</span></div>
                    <div class="result-row"><span class="result-label">服务延迟</span><span class="result-value">${data.latency||'-'} ms</span></div>
                    <div class="result-row"><span class="result-label">网络往返</span><span class="result-value">${netMs} ms</span></div>
                    ${errMsg ? sep + '<div style="font-size:0.8125rem;font-weight:500;margin-bottom:0.5rem;">错误详情</div><div style="font-size:0.8125rem;color:hsl(0 84.2% 50%);background:hsl(0 84.2% 60.2% / 0.06);padding:0.75rem;border-radius:var(--radius);line-height:1.6;word-break:break-word;">'+errMsg+'</div>' : ''}
                    ${closeBtn}`;
            }
        }

        /* ========== Init ========== */

        document.getElementById('addKeyInput').addEventListener('keydown', e => { if (e.key === 'Enter') submitAddKey(); });
        initModalClose('editKeyModal');
        initModalClose('addKeyModal');

        async function refresh() {
            await Promise.all([fetchStats(), fetchKeys()]);
            document.getElementById('refreshTime').textContent = '最后更新: ' + new Date().toLocaleTimeString('zh-CN');
        }
        loadChannels().then(() => refresh());
        setInterval(refresh, 10000);
    </script>
</body>
</html>
