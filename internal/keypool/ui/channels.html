<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiMo Proxy - 渠道管理</title>
    <link rel="stylesheet" href="/ui/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"/><circle cx="16.5" cy="7.5" r=".5"/></g></svg>
                MiMo Proxy
            </div>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-item" href="/ui/keys">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"/><circle cx="16.5" cy="7.5" r=".5"/></g></svg>
                Key 管理
            </a>
            <a class="nav-item active" href="/ui/channels">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></g></svg>
                渠道
            </a>
            <a class="nav-item" href="/ui/logs">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M15 12h-5m5-4h-5m9 9V5a2 2 0 0 0-2-2H4"/><path d="M8 21h12a2 2 0 0 0 2-2v-1a1 1 0 0 0-1-1H11a1 1 0 0 0-1 1v1a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v2a1 1 0 0 0 1 1h3"/></g></svg>
                日志
            </a>
            <a class="nav-item" href="/ui/settings">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0a2.34 2.34 0 0 0 3.319 1.915a2.34 2.34 0 0 1 2.33 4.033a2.34 2.34 0 0 0 0 3.831a2.34 2.34 0 0 1-2.33 4.033a2.34 2.34 0 0 0-3.319 1.915a2.34 2.34 0 0 1-4.659 0a2.34 2.34 0 0 0-3.32-1.915a2.34 2.34 0 0 1-2.33-4.033a2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/></g></svg>
                设置
            </a>
        </nav>
        <div class="sidebar-footer">MiMo Key Pool Proxy</div>
    </aside>

    <div class="main">
        <div class="main-header">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div>
                    <h1>渠道管理</h1>
                    <p>管理上游 API 渠道，每个渠道可设置独立的 Base URL 和路由前缀</p>
                </div>
                <button class="btn btn-primary btn-sm" onclick="openAddChannelModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14m-7-7v14"/></svg>
                    添加渠道
                </button>
            </div>
        </div>
        <div class="main-body">
            <div id="channelsGrid"></div>
        </div>
    </div>

    <!-- Add/Edit Channel Modal -->
    <div class="modal-overlay" id="addChannelModal">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-title">添加渠道</div>
                <button class="modal-close" onclick="closeAddChannelModal()" aria-label="关闭">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="chEditId">
                <div class="field-group">
                    <label>渠道名称</label>
                    <input type="text" id="chName" placeholder="例如：MiMo 主力" style="width:100%;">
                </div>
                <div class="field-group" style="margin-top:1rem;">
                    <label>路由前缀 <span style="color:hsl(0 84.2% 60.2%)">*</span></label>
                    <input type="text" id="chPrefix" placeholder="例如：mimo" style="width:100%;" required>
                    <div class="field-hint">必填。客户端通过 <code>/c/{前缀}/v1/chat/completions</code> 访问此渠道</div>
                </div>
                <div class="field-group" style="margin-top:1rem;">
                    <label>Base URL</label>
                    <input type="text" id="chBaseURL" placeholder="https://api.xiaomimimo.com/v1/chat/completions" style="width:100%;">
                </div>
                <div class="field-group" style="margin-top:1rem;">
                    <label>Key 选择模式</label>
                    <select id="chKeyMode" style="width:100%;">
                        <option value="round-robin">轮询 — 均匀分配请求到所有 Key</option>
                        <option value="failover">故障转移 — 用完一个再换下一个</option>
                    </select>
                    <div class="field-hint">轮询模式按使用次数均匀分配；故障转移模式固定使用一个 Key，失败后自动切换</div>
                </div>
                <div style="margin-top:1.25rem;display:flex;gap:0.5rem;">
                    <button class="btn btn-outline" onclick="closeAddChannelModal()" style="flex:1;">取消</button>
                    <button class="btn btn-primary" onclick="submitAddChannel()" style="flex:1;">添加</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="/ui/common.js"></script>
    <script>
        /* ========== Channels ========== */

        async function loadChannels() {
            try {
                const res = await fetch(API_BASE + '/channels');
                const data = await res.json();
                renderChannels(data.channels || []);
            } catch (e) { console.error('loadChannels:', e); }
        }

        function renderChannels(channels) {
            const grid = document.getElementById('channelsGrid');
            if (!channels || channels.length === 0) {
                grid.innerHTML = '<div class="empty-state"><p>暂无渠道</p><p class="empty-hint">添加渠道以配置上游 API</p></div>';
                return;
            }
            let rows = '';
            for (const c of channels) {
                const badge = c.is_default
                    ? '<span class="badge badge-success"><span class="badge-dot"></span>默认</span>'
                    : (c.enabled ? '<span class="badge badge-success" style="opacity:0.5">启用</span>' : '<span class="badge badge-warning"><span class="badge-dot"></span>禁用</span>');
                const toggle = c.enabled
                    ? `<button class="btn btn-sm btn-ghost" data-tip="禁用" onclick="toggleChannel(${c.id}, false)">${ICO.toggleOn}</button>`
                    : `<button class="btn btn-sm btn-ghost" data-tip="启用" onclick="toggleChannel(${c.id}, true)">${ICO.toggleOff}</button>`;
                const defaultBtn = c.is_default ? '' : `<button class="btn btn-sm btn-ghost" data-tip="设为默认" onclick="setDefaultChannel(${c.id})">${ICO.star}</button>`;
                const modeLabel = c.key_mode === 'failover'
                    ? '<span class="badge badge-warning"><span class="badge-dot"></span>故障转移</span>'
                    : '<span class="badge" style="background:hsl(var(--muted));color:hsl(var(--muted-foreground));">轮询</span>';
                const proxyUrl = location.origin + '/c/' + c.prefix + '/v1';
                rows += `<tr>
                    <td style="font-weight:500;">${c.name || '-'}</td>
                    <td style="font-family:monospace;font-size:0.8125rem;"><code>/c/${c.prefix}</code></td>
                    <td class="td-key" title="${c.base_url}" style="max-width:260px;">${c.base_url}</td>
                    <td style="font-family:monospace;font-size:0.8125rem;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${proxyUrl}">${proxyUrl}</td>
                    <td>${modeLabel}</td>
                    <td>${badge}</td>
                    <td class="td-actions"><div class="btn-group">
                        <button class="btn btn-sm btn-ghost" data-tip="复制代理URL" onclick="copyProxyUrl('${proxyUrl}')">${ICO.copy}</button>
                        <button class="btn btn-sm btn-ghost" data-tip="编辑" onclick='openEditChannelModal(${JSON.stringify(c).replace(/'/g,"&#39;")})'>${ICO.pencil}</button>
                        ${defaultBtn}
                        ${toggle}
                        <button class="btn btn-sm btn-ghost" data-tip="删除" style="color:hsl(var(--destructive))" onclick="removeChannel(${c.id})">${ICO.trash}</button>
                    </div></td>
                </tr>`;
            }
            grid.innerHTML = `<div class="table-wrapper"><table><thead><tr>
                <th>名称</th><th>前缀</th><th>上游 URL</th><th>代理 URL</th><th>模式</th><th>状态</th><th style="text-align:right">操作</th>
            </tr></thead><tbody>${rows}</tbody></table></div>`;
        }

        function copyProxyUrl(url) {
            navigator.clipboard.writeText(url).then(() => showToast('已复制: ' + url));
        }

        async function setDefaultChannel(id) {
            await fetch(API_BASE + '/channels', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({action:'set-default', id})
            });
            await loadChannels();
            showToast('已设为默认渠道');
        }

        function openAddChannelModal() {
            document.getElementById('chName').value = '';
            document.getElementById('chPrefix').value = '';
            document.getElementById('chBaseURL').value = '';
            document.getElementById('chKeyMode').value = 'round-robin';
            document.getElementById('chEditId').value = '';
            document.querySelector('#addChannelModal .modal-title').textContent = '添加渠道';
            document.getElementById('addChannelModal').classList.add('open');
        }

        function openEditChannelModal(c) {
            document.getElementById('chName').value = c.name || '';
            document.getElementById('chPrefix').value = c.prefix || '';
            document.getElementById('chBaseURL').value = c.base_url || '';
            document.getElementById('chKeyMode').value = c.key_mode || 'round-robin';
            document.getElementById('chEditId').value = c.id;
            document.querySelector('#addChannelModal .modal-title').textContent = '编辑渠道';
            document.getElementById('addChannelModal').classList.add('open');
        }

        function closeAddChannelModal() {
            document.getElementById('addChannelModal').classList.remove('open');
        }

        async function submitAddChannel() {
            const name = document.getElementById('chName').value.trim();
            const prefix = document.getElementById('chPrefix').value.trim();
            const base_url = document.getElementById('chBaseURL').value.trim();
            const key_mode = document.getElementById('chKeyMode').value;
            const editId = document.getElementById('chEditId').value;
            if (!prefix) { document.getElementById('chPrefix').focus(); showToast('前缀不能为空', true); return; }
            if (!base_url) { document.getElementById('chBaseURL').focus(); return; }
            try {
                const action = editId ? 'update' : 'add';
                const body = {action, name, prefix, base_url, key_mode};
                if (editId) body.id = parseInt(editId);
                await fetch(API_BASE + '/channels', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(body)
                });
                closeAddChannelModal();
                await loadChannels();
                showToast(editId ? '渠道已更新' : '渠道已添加');
            } catch (e) { alert('操作失败: ' + e); }
        }

        async function toggleChannel(id, enable) {
            await fetch(API_BASE + '/channels', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({action: enable ? 'enable' : 'disable', id})
            });
            await loadChannels();
        }

        async function removeChannel(id) {
            if (!confirm('确定删除此渠道？')) return;
            await fetch(API_BASE + '/channels', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({action:'remove', id})
            });
            await loadChannels();
        }

        /* ========== Init ========== */
        initModalClose('addChannelModal');
        loadChannels();
    </script>
</body>
</html>
