<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiMo Proxy - 请求日志</title>
    <link rel="stylesheet" href="/ui/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"/><circle cx="16.5" cy="7.5" r=".5"/></g></svg>
                MiMo Proxy
            </div>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-item" href="/ui/keys">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"/><circle cx="16.5" cy="7.5" r=".5"/></g></svg>
                Key 管理
            </a>
            <a class="nav-item" href="/ui/channels">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></g></svg>
                渠道
            </a>
            <a class="nav-item active" href="/ui/logs">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M15 12h-5m5-4h-5m9 9V5a2 2 0 0 0-2-2H4"/><path d="M8 21h12a2 2 0 0 0 2-2v-1a1 1 0 0 0-1-1H11a1 1 0 0 0-1 1v1a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v2a1 1 0 0 0 1 1h3"/></g></svg>
                日志
            </a>
            <a class="nav-item" href="/ui/settings">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0a2.34 2.34 0 0 0 3.319 1.915a2.34 2.34 0 0 1 2.33 4.033a2.34 2.34 0 0 0 0 3.831a2.34 2.34 0 0 1-2.33 4.033a2.34 2.34 0 0 0-3.319 1.915a2.34 2.34 0 0 1-4.659 0a2.34 2.34 0 0 0-3.32-1.915a2.34 2.34 0 0 1-2.33-4.033a2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/></g></svg>
                设置
            </a>
        </nav>
        <div class="sidebar-footer">MiMo Key Pool Proxy</div>
    </aside>

    <div class="main">
        <div class="main-header">
            <h1>请求日志</h1>
            <p>最近 1 小时的代理请求记录，每 5 秒自动刷新</p>
        </div>
        <div class="main-body">
            <div id="logsGrid"></div>
        </div>
    </div>

    <!-- Log Detail Modal -->
    <div class="modal-overlay" id="logDetailModal">
        <div class="modal" style="max-width:48rem;" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-title">请求详情</div>
                <button class="modal-close" onclick="closeLogDetail()" aria-label="关闭">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="modal-body" id="logDetailBody" style="max-height:70vh;overflow-y:auto;"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="/ui/common.js"></script>
    <script>
        /* ========== Logs ========== */

        let logsTimer = null;
        let logsPage = 1;

        async function loadLogs() {
            try {
                const res = await fetch(API_BASE + '/logs?page=' + logsPage);
                const data = await res.json();
                renderLogs(data.logs || [], data.total || 0, data.page || 1);
            } catch (e) { console.error('loadLogs:', e); }
        }

        function renderLogs(logs, total, page) {
            const grid = document.getElementById('logsGrid');
            const totalPages = Math.max(Math.ceil(total / 10), 1);

            if (!logs || logs.length === 0) {
                grid.innerHTML = '<div class="empty-state"><p>暂无请求日志</p><p class="empty-hint">最近 1 小时内的请求会显示在这里</p></div>';
                return;
            }
            let rows = '';
            for (const l of logs) {
                const statusClass = l.status_code >= 200 && l.status_code < 300 ? 'color:hsl(142 76% 36%)' : 'color:hsl(0 84.2% 60.2%)';
                const time = l.created_at ? new Date(l.created_at.replace(' ', 'T') + (l.created_at.includes('Z') ? '' : 'Z')).toLocaleTimeString('zh-CN') : '-';
                rows += `<tr>
                    <td style="font-size:0.8125rem;color:hsl(var(--muted-foreground));white-space:nowrap;">${time}</td>
                    <td><code style="font-size:0.75rem;">${l.method}</code></td>
                    <td style="font-size:0.8125rem;font-family:monospace;">${l.path}</td>
                    <td style="${statusClass};font-weight:600;">${l.status_code}</td>
                    <td class="td-usage">${l.latency_ms} ms</td>
                    <td style="font-size:0.8125rem;font-family:monospace;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${l.proxy_key||''}">${l.proxy_key ? l.proxy_key.substring(0,12)+'…' : '-'}</td>
                    <td style="font-size:0.8125rem;">${l.model || '-'}</td>
                    <td class="td-usage">${l.total_tokens || '-'}</td>
                    <td style="font-size:0.8125rem;color:hsl(0 84.2% 50%);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${l.error||''}">${l.error || ''}</td>
                    <td class="td-actions"><button class="btn btn-sm btn-outline" onclick="showLogDetail(${l.id})">详情</button></td>
                </tr>`;
            }
            const pagination = `<div class="pagination">
                <span class="pagination-info">共 ${total} 条，第 ${page}/${totalPages} 页</span>
                <div class="pagination-btns">
                    <button class="btn btn-sm btn-outline" onclick="logsGoPage(1)" ${page<=1?'disabled':''}>首页</button>
                    <button class="btn btn-sm btn-outline" onclick="logsGoPage(${page-1})" ${page<=1?'disabled':''}>上一页</button>
                    <button class="btn btn-sm btn-outline" onclick="logsGoPage(${page+1})" ${page>=totalPages?'disabled':''}>下一页</button>
                    <button class="btn btn-sm btn-outline" onclick="logsGoPage(${totalPages})" ${page>=totalPages?'disabled':''}>末页</button>
                </div>
            </div>`;
            grid.innerHTML = `<div class="table-wrapper"><table><thead><tr>
                <th>时间</th><th>方法</th><th>路径</th><th>状态</th><th>延迟</th><th>代理Key</th><th>模型</th><th>Tokens</th><th>错误</th><th></th>
            </tr></thead><tbody>${rows}</tbody></table></div>${pagination}`;
        }

        function logsGoPage(page) {
            if (page < 1) return;
            logsPage = page;
            loadLogs();
        }

        async function showLogDetail(id) {
            const modal = document.getElementById('logDetailModal');
            const body = document.getElementById('logDetailBody');
            body.innerHTML = '<div class="loading"><div class="spinner"></div>加载中…</div>';
            modal.classList.add('open');

            try {
                const res = await fetch(API_BASE + '/logs?id=' + id);
                const l = await res.json();

                const reqBody = l.request_body ? formatJSON(l.request_body) : '<span style="color:hsl(var(--muted-foreground))">-</span>';
                const resBody = l.response_body ? formatJSON(l.response_body) : '<span style="color:hsl(var(--muted-foreground))">（流式响应，未记录完整内容）</span>';

                body.innerHTML = `
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1rem;">
                        <div class="result-row" style="border:none;padding:0;"><span class="result-label">状态</span><span class="result-value" style="color:${l.status_code>=200&&l.status_code<300?'hsl(142 76% 36%)':'hsl(0 84.2% 60.2%)'};font-weight:600;">${l.status_code}</span></div>
                        <div class="result-row" style="border:none;padding:0;"><span class="result-label">延迟</span><span class="result-value">${l.latency_ms} ms</span></div>
                        <div class="result-row" style="border:none;padding:0;"><span class="result-label">模型</span><span class="result-value">${l.model||'-'}</span></div>
                        <div class="result-row" style="border:none;padding:0;"><span class="result-label">Tokens</span><span class="result-value">${l.total_tokens||0}</span></div>
                    </div>
                    <div style="margin-bottom:1rem;">
                        <div style="font-size:0.8125rem;font-weight:500;margin-bottom:0.375rem;">Request</div>
                        <div class="code-block">${reqBody}</div>
                    </div>
                    <div>
                        <div style="font-size:0.8125rem;font-weight:500;margin-bottom:0.375rem;">Response</div>
                        <div class="code-block">${resBody}</div>
                    </div>`;
            } catch (e) {
                body.innerHTML = `<div class="result-error-banner">${ICO.cross}<span>${e.message}</span></div>`;
            }
        }

        function closeLogDetail() {
            document.getElementById('logDetailModal').classList.remove('open');
        }

        /* ========== Init ========== */
        initModalClose('logDetailModal');
        loadLogs();
        logsTimer = setInterval(loadLogs, 5000);
    </script>
</body>
</html>
